name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - claude/deploy-streamlit-dashboard-hact0
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install huggingface_hub
        run: pip install -q "huggingface_hub>=0.23"

      - name: Create Space, set secret, upload files
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          python - <<'EOF'
import os
from huggingface_hub import HfApi

api = HfApi(token=os.environ["HF_TOKEN"])

# 1. Create Space (no-op if it already exists)
api.create_repo(
    repo_id="menezes123/itbi-sp-dashboard",
    repo_type="space",
    space_sdk="streamlit",
    private=False,
    exist_ok=True,
)
print("✅ Space ready")

# 2. Set MOTHERDUCK_TOKEN as a Space secret
api.add_space_secret(
    repo_id="menezes123/itbi-sp-dashboard",
    key="MOTHERDUCK_TOKEN",
    value=os.environ["MOTHERDUCK_TOKEN"],
)
print("✅ Secret set")

# 3. Upload all committed files (data/ and .git/ are excluded)
api.upload_folder(
    folder_path=".",
    repo_id="menezes123/itbi-sp-dashboard",
    repo_type="space",
    ignore_patterns=["data/*", ".git/*"],
    commit_message="Deploy from GitHub Actions",
)
print("✅ Live → https://huggingface.co/spaces/menezes123/itbi-sp-dashboard")
EOF
